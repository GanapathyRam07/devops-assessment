version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "=== Installing dependencies ==="
      - cd app && npm install && cd ..
      - echo "=== Installing Trivy ==="
      - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

  pre_build:
    commands:
      - echo "=== Running Tests ==="
      - cd app && npm test && cd ..
      - echo "=== Logging into ECR ==="
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REPO_URI
      - IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - echo "Image tag is $IMAGE_TAG"

  build:
    commands:
      - echo "=== Building Docker Image ==="
      - docker build -f docker/Dockerfile -t $ECR_REPO_URI:$IMAGE_TAG .
      - docker tag $ECR_REPO_URI:$IMAGE_TAG $ECR_REPO_URI:latest

  post_build:
    commands:
      - echo "=== Running Security Scan ==="
      - trivy image --exit-code 0 --severity HIGH,CRITICAL $ECR_REPO_URI:$IMAGE_TAG
      - echo "=== Pushing Image to ECR ==="
      - docker push $ECR_REPO_URI:$IMAGE_TAG
      - docker push $ECR_REPO_URI:latest
      - echo "=== Deploying to EC2 via SSM ==="
      - INSTANCE_ID=$(aws ec2 describe-instances --filters "Name=tag:Name,Values=dev-app-server" "Name=instance-state-name,Values=running" --query "Reservations[0].Instances[0].InstanceId" --output text --region $AWS_DEFAULT_REGION)
      - echo "Deploying to instance $INSTANCE_ID"
      - aws ssm send-command --instance-ids $INSTANCE_ID --document-name "AWS-RunShellScript" --parameters commands=["aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin $ECR_REPO_URI && docker pull $ECR_REPO_URI:latest && docker stop app || true && docker rm app || true && docker run -d -p 3000:3000 --name app $ECR_REPO_URI:latest"] --region $AWS_DEFAULT_REGION
      - echo "=== Deployment Complete ==="
      - printf '[{"name":"app","imageUri":"%s"}]' $ECR_REPO_URI:$IMAGE_TAG > imagedefinitions.json
      - cat imagedefinitions.json

artifacts:
  files:
    - '**/*'
  discard-paths: no