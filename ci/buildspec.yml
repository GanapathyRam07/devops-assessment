version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: "ap-south-1"
    IMAGE_TAG: "latest"
  parameter-store:
    ECR_REPO_URI: "/devops-assessment/ecr-repo-uri"

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "=== Installing dependencies ==="
      - cd app
      - npm install
      - echo "=== Installing Trivy for security scan ==="
      - rpm -ivh https://github.com/aquasecurity/trivy/releases/download/v0.48.0/trivy_0.48.0_Linux-64bit.rpm

  pre_build:
    commands:
      - echo "=== Running Tests ==="
      - cd app
      - npm test
      - echo "=== Logging into ECR ==="
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REPO_URI
      - IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - echo "Image tag is $IMAGE_TAG"

  build:
    commands:
      - echo "=== Building Docker Image ==="
      - docker build -f docker/Dockerfile -t $ECR_REPO_URI:$IMAGE_TAG .
      - docker tag $ECR_REPO_URI:$IMAGE_TAG $ECR_REPO_URI:latest

  post_build:
    commands:
      - echo "=== Running Security Scan ==="
      - trivy image --exit-code 0 --severity HIGH,CRITICAL $ECR_REPO_URI:$IMAGE_TAG
      - echo "=== Pushing Image to ECR ==="
      - docker push $ECR_REPO_URI:$IMAGE_TAG
      - docker push $ECR_REPO_URI:latest
      - echo "=== Writing image definitions ==="
      - printf '[{"name":"app","imageUri":"%s"}]' $ECR_REPO_URI:$IMAGE_TAG > imagedefinitions.json
      - cat imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
    - appspec.yml
  discard-paths: yes

reports:
  jest-reports:
    files:
      - "app/coverage/clover.xml"
    file-format: CLOVERXML